<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ranking Ademicon</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <!-- =========================
         COLUNA ESQUERDA
    ========================== -->

    <div class="left">

        <div class="logo-area">

            <img
                src="logo-ademicon.png.png"
                class="logo-ademicon"
                alt="Ademicon">

            <h2>RANKING DE VENDAS</h2>

        </div>

        <div class="podium">

            <div class="winner second" id="secondPlace"></div>

            <div class="winner first" id="firstPlace"></div>

            <div class="winner third" id="thirdPlace"></div>

        </div>

          <div class="footer-dashboard">

            <div class="footer-left">

                <div class="footer-item">
                    🎯 <span>FOCO NO OBJETIVO</span>
                </div>

                <div class="footer-item">
                    🏆 <span>DISCIPLINA TODO DIA</span>
                </div>

                <div class="footer-item">
                    🚀 <span>RESULTADOS EXTRAORDINÁRIOS</span>
                </div>

            </div>

        </div>

    </div>


    <div class="right">

        <div class="top-panel">

            <div class="top-title">
                TOP 10
            </div>

            <div class="last-update">
                Última atualização:
                <span id="lastUpdate">--</span>
            </div>

            <div class="unit-total">

                <div class="unit-total-label">
                    VOLUME TOTAL DA UNIDADE
                </div>

                <div class="unit-total-value" id="unitTotal">
                    R$ 0,00
                </div>

            </div>

            <!-- META DO MÊS -->

            <div class="meta-box">

                <div class="meta-label">
                    META DO MÊS
                </div>

                <div class="meta-values">

                    <span id="metaAtual">
                        R$ 0,00
                    </span>

                    /

                    <span id="metaMes">
                        R$ 0,00
                    </span>

                </div>

                <div class="progress-bar">
                    <div id="progressFill"></div>
                </div>

                <div class="meta-info">

                    <span id="percentualMeta">
                        0%
                    </span>

                    <span id="faltanteMeta">
                        Faltam R$ 0,00
                    </span>

                </div>

            </div>


            <!-- TABELA -->

            <table class="ranking-table">

                <thead>

                    <tr>
                        <th>POS.</th>
                        <th>CONSULTOR</th>
                        <th>VOLUME</th>
                    </tr>

                </thead>

                <tbody id="rankingTable">

                </tbody>

            </table>

        </div>

    </div>

</div>

<script src="app.js"></script>

</body>
</html>
